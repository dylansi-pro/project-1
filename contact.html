<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koko Café | Contact</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="site-container">
      <header class="main-header">
        <div class="logo">
          <a href="index.html">
            <img
              src="images/koko_cafe_logo.png"
              alt="Koko Café Logo"
              class="logo-img"
            />
          </a>
        </div>

        <nav class="main-navigation">
          <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li class="dropdown">
              <a href="about.html" class="dropdown-trigger">About us ▾</a>
              <ul class="dropdown-child">
                <li><a href="about.html#staff">Our Staff</a></li>
              </ul>
            </li>

            <li class="dropdown">
              <a href="menu.html" class="dropdown-trigger">Our Menu ▾</a>
              <ul class="dropdown-child">
                <li><a href="menu.html#coffee">Specialty Coffee</a></li>
                <li><a href="menu.html#pastries">Pastries</a></li>
                <li><a href="menu.html#brunch">Brunch</a></li>
              </ul>
            </li>

            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
          </ul>
        </nav>
      </header>

      <main class="contact-page">
        <h2>Contact Us</h2>
        <form
          action="https://hnitest.go.yj.fr"
          method="POST"
          class="contact-form"
        >
          <div>
            <label for="lastname">Last name :</label>
            <input
              class="form-input"
              id="lastname"
              type="text"
              name="lastname"
              required
            />
          </div>

          <div>
            <label for="firstname">First name :</label>
            <input
              class="form-input"
              id="firstname"
              type="text"
              name="firstname"
              required
            />
          </div>

          <div>
            <label for="mail">Email address :</label>
            <input
              class="form-input"
              id="mail"
              type="email"
              name="mail"
              placeholder="yourmail@yahoo.com"
              required
            />
          </div>

          <div>
            <label for="request">Request :</label>
            <textarea
              class="form-input"
              name="request"
              id="request"
              cols="66"
              rows="10"
              required
            ></textarea>
          </div>

          <div>
            <label for="country">Country :</label>
            <select class="form-input" name="country" id="country" required>
              <option value="">-- Select a country --</option>
              <option value="france">France</option>
              <option value="belgium">Belgium</option>
              <option value="switzerland">Switzerland</option>
              <option value="united kingdom">United Kingdom</option>
              <option value="spain">Spain</option>
              <option value="germany">Germany</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <button type="submit">Send</button>
          </div>
        </form>
      </main>

      <footer class="main-footer">
        <p>&copy; 2026 Koko Café.</p>
      </footer>
    </div>
  </body>
</html>
